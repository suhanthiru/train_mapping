# nginx alternative to infra/Caddyfile — same routing, but TLS certs are your
# own responsibility (Caddy gets Let's Encrypt automatically; nginx doesn't).
# Recommended path: certbot --nginx after this config is in place:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d map.yourdomain.com -d analytics.yourdomain.com
# Copy to /etc/nginx/sites-available/train-tracker, symlink into
# sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx
#
# These path prefixes match dashboard/app.js's proxy-mode branching exactly
# (see the comment there) — don't rename one without the other.

# Shared WebSocket upgrade mapping (nginx needs this explicitly; Caddy does
# it automatically). Put this in the http{} block if you're merging into an
# existing nginx.conf rather than using this whole file standalone.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Live 3D map + its own API/WebSocket — single origin, no path rewriting.
server {
    listen 80;
    server_name map.yourdomain.com;
    # certbot will add the 443/TLS server block + redirect here automatically

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Analytics dashboard + its three backend dependencies, all same-origin under
# one cert via path prefixes.
server {
    listen 80;
    server_name analytics.yourdomain.com;

    location /api-backend/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-kalman/ {
        proxy_pass http://127.0.0.1:8092/;
        proxy_set_header Host $host;
    }
    location /api-analytics/ {
        proxy_pass http://127.0.0.1:8091/;
        proxy_set_header Host $host;
    }
    location / {
        proxy_pass http://127.0.0.1:4174;
        proxy_set_header Host $host;
    }

    # Uncomment to password-protect the dashboard:
    # auth_basic "restricted";
    # auth_basic_user_file /etc/nginx/.htpasswd;   # create with: htpasswd -c /etc/nginx/.htpasswd admin
}
