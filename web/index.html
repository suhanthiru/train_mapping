<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transit Tracker — NYC</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #000103;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: rgba(150, 235, 255, 0.85);
      }
      #map { position: absolute; inset: 0; background: #000103; }
      #map .maplibregl-ctrl-attrib { background: rgba(0,0,0,0.4); }
      #map .maplibregl-ctrl-attrib a { color: rgba(120,200,220,0.6); }
      .maplibregl-canvas { outline: none; }
      /* dual-canvas bloom overlay (reference technique): screen-blend a blurred copy */
      #bloom-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        pointer-events: none; mix-blend-mode: screen;
        filter: blur(17px) brightness(1.9) saturate(1.4); opacity: 0.95;
      }
      .hud {
        position: fixed; left: 24px; bottom: 22px; z-index: 5; pointer-events: none;
      }
      .hud .line {
        width: 38px; height: 2px; margin-bottom: 10px;
        background: linear-gradient(90deg, #5ef1ff, transparent);
      }
      .hud h1 {
        font-size: 15px; font-weight: 600; letter-spacing: 0.16em;
        text-transform: uppercase; color: #c8f7ff;
        text-shadow: 0 0 12px rgba(90, 230, 255, 0.6);
      }
      .hud p { margin-top: 4px; font-size: 11px; letter-spacing: 0.06em; color: rgba(120, 200, 220, 0.6); }
      /* glassmorphism panels */
      .panel {
        position: fixed; z-index: 6; padding: 10px 14px; border-radius: 12px;
        background: rgba(10, 22, 30, 0.55); backdrop-filter: blur(14px);
        border: 1px solid rgba(90, 230, 255, 0.18);
        color: #c8f7ff; font-size: 12px; letter-spacing: 0.04em;
      }
      #stat { top: 20px; left: 20px; }
      #tooltip {
        pointer-events: none; display: none; max-width: 240px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
      }
      #arrivals {
        display: none; top: 74px; left: 20px; min-width: 210px; max-width: 260px;
        max-height: 62vh; overflow: auto; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
      }
      #arrivals .row { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
      #arrivals .close { float: right; opacity: 0.5; cursor: pointer; }
      #tooltip .route-badge {
        display: inline-block; min-width: 20px; height: 20px; line-height: 20px;
        text-align: center; border-radius: 10px; font-weight: 700; color: #000;
        padding: 0 6px; margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <canvas id="bloom-canvas"></canvas>
    </div>
    <div id="stat" class="panel">connecting…</div>
    <div id="tooltip" class="panel"></div>
    <div id="arrivals" class="panel"></div>
    <div class="hud">
      <div class="line"></div>
      <h1>New York City</h1>
      <p>Live subway · GTFS-realtime</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
