# One-command run of the whole polyglot stack: `docker compose up --build`.
# Services talk over the default bridge network by name (train_3d_map, kalman-rs, …);
# host ./data is a volume so the SQLite ledgers persist across restarts.
services:
  kalman-rs:
    build: ./kalman-rs
    ports: ["8092:8092"]
    # debian-slim has no curl; bash /dev/tcp is a zero-dependency TCP probe
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8092"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  analytics-py:
    # Context is the repo root (not ./analytics-py) so the image can also copy
    # shared/features.json, which featurize.py loads at startup. See the
    # Dockerfile header for why.
    build:
      context: .
      dockerfile: analytics-py/Dockerfile
    ports: ["8091:8091"]
    # Bind-mount ./data so the model reads the same ledger train_3d_map writes and
    # persists the trained model across restarts (MODEL_DIR). Without this the
    # containerized retrain reads an empty DB and /predict 503s on every restart.
    environment:
      - LEDGER_DB=/data/ledger.db
      - MODEL_DIR=/data/models
      - GOLDENSET_DIR=/data/exports/goldenset
      # Blend down-weighted MTA-history rows into every 6h retrain. Measured
      # (eval_pretrain.py, 2026-07-12): v1 cold-start MAE -47.6s, overall flat.
      # Without this the auto-retrain silently unwinds the pretrain win.
      - PRETRAIN_HISTORY=1
      - PRETRAIN_WEIGHT=0.3
      - HISTORY_CACHE_DIR=/data/history_cache
    volumes:
      - ./data:/data
    # python:3.11-slim has no curl; stdlib urllib is the zero-dependency probe.
    # /health responds even while models/baselines are still warming (by design
    # — see app.py), so this gates on "process serving", not "fully warm".
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=4).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  train_3d_map:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8088:8088"]
    volumes:
      - ./data:/app/data
      - ./web/dist:/app/web/dist:ro
    # service_healthy (not just started): train_3d_map's first tick calls both deps;
    # racing ahead of them used to cost a full timeout cascade on cold boots.
    depends_on:
      kalman-rs:
        condition: service_healthy
      analytics-py:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8088/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  analytics-go:
    build: ./analytics-go
    ports: ["8090:8090"]
    volumes:
      - ./data:/data
    # NOTE: no healthcheck — distroless image has no shell/utilities to exec a
    # probe with (the Go binary is the only executable). It does expose GET
    # /health on :8090 for external monitors.
    depends_on:
      train_3d_map:
        condition: service_healthy
      analytics-py:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports: ["4174:4174"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4174/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
