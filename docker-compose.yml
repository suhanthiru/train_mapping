# One-command run of the whole polyglot stack: `docker compose up --build`.
# Services talk over the default bridge network by name (backend, kalman-rs, …);
# host ./data is a volume so the SQLite ledgers persist across restarts.
services:
  kalman-rs:
    build: ./kalman-rs
    ports: ["8092:8092"]

  analytics-py:
    build: ./analytics-py
    ports: ["8091:8091"]
    # Bind-mount ./data so the model reads the same ledger the backend writes and
    # persists the trained model across restarts (MODEL_DIR). Without this the
    # containerized retrain reads an empty DB and /predict 503s on every restart.
    environment:
      - LEDGER_DB=/data/ledger.db
      - MODEL_DIR=/data/models
      - GOLDENSET_DIR=/data/exports/goldenset
    volumes:
      - ./data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8080:8080"]
    volumes:
      - ./data:/app/data
      - ./web/dist:/app/web/dist:ro
    depends_on: [kalman-rs, analytics-py]

  analytics-go:
    build: ./analytics-go
    ports: ["8090:8090"]
    volumes:
      - ./data:/data
    depends_on: [backend, analytics-py]

  dashboard:
    build: ./dashboard
    ports: ["4174:4174"]
